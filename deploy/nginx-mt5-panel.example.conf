# Example reverse proxy: TLS terminates here, panel static + API upstream on 3001.
# Adjust server_name, paths, cert paths, and upstream. Do not expose the API to the public
# without TLS + PANEL_API_KEY and/or network restrictions.
#
# Redirect HTTP → HTTPS (separate server block; same server_name):
#   server {
#       listen 80;
#       server_name panel.example.com;
#       return 301 https://$host$request_uri;
#   }

upstream mt5_panel_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name panel.example.com;

    # ssl_certificate     /etc/letsencrypt/live/panel.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/panel.example.com/privkey.pem;

    # SPA build output (npm run build → dist/)
    root /var/www/mt5-panel/dist;
    index index.html;

    location /api/ {
        proxy_pass http://mt5_panel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # If the API uses PANEL_API_KEY and the browser must not know it, inject from an nginx map or env:
        # proxy_set_header X-Panel-Api-Key "your-secret-here";
    }

    # Covers /ws/positions, /ws/agent (admin hub), /ws/agent/device (remote agent terminal inventory), etc.
    location /ws/ {
        proxy_pass http://mt5_panel_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        # Same optional header as /api/ if you terminate panel key at the edge.
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
